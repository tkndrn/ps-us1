name: IPTV Otomatik Guncelle

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kütüphaneleri Yukle
        run: pip install undetected-chromedriver selenium

      - name: Botu Calistir
        run: python iptv_bot.py

      - name: Degisiklikleri Kaydet
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add hesap_bilgileri.txt
          # Değişiklik olsa da olmasa da commit yapmaya zorla (date ekleyerek)
          git commit -m "Güncelleme: $(date)" || echo "Değişiklik yok ama devam et"
          git push origin main
