name: IPTV Otomatik Guncelle

on:
  schedule:
    - cron: '0 3 * * *' # Her gece Türkiye saatiyle 06:00'da çalışır
  workflow_dispatch: # İstediğin zaman elle başlatma butonu

permissions:
  contents: write # GitHub'a "dosyayı değiştirme yetkim var" der

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Araçları Yükle
        run: pip install -r requirements.txt

      - name: Botu Çalıştır ve Veriyi Çek
        run: python iptv_bot.py

      - name: Değişikliği Kaydet ve Yayınla
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add hesap_bilgileri.txt
          # Sadece veri değişmişse (yeni şifre gelmişse) sisteme yükle
          git diff --quiet && git diff --staged --quiet || (git commit -m "Otomatik Güncelleme: $(date)" && git push)
