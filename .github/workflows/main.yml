name: IPTV Otomatik Guncelle
on:
  schedule:
    - cron: '0 3 * * *' # Her gece 03:00'te (UTC) otomatik çalışır
  workflow_dispatch: # Manuel çalıştırma butonu ekler

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kütüphaneleri Yukle
        run: |
          pip install -r requirements.txt

      - name: Botu Calistir
        run: python iptv_bot.py

      - name: Degisiklikleri Kaydet
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          # Dosya oluştuysa GitHub'a geri yükle
          if [ -f hesap_bilgileri.txt ]; then
            git add hesap_bilgileri.txt
            git commit -m "Hesap bilgileri güncellendi" || echo "Değişiklik yok"
            git push
          else
            echo "HATA: hesap_bilgileri.txt bulunamadı!"
            exit 1
          fi
