name: IPTV Otomatik Guncelle

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Cek
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kütüphaneleri ve Sanal Ekrani Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install -r requirements.txt

      - name: Botu Sanal Ekranla Calistir
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
        run: |
          # xvfb-run komutu, botun sanki bir monitör varmış gibi çalışmasını sağlar
          xvfb-run --server-args="-screen 0 1920x1080x24" python iptv_bot.py

      - name: Degisiklikleri Kaydet
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add hesap_bilgileri.txt
          git commit -m "IPTV Güncellendi: $(date)" || echo "Değişiklik yok"
          git push origin main
